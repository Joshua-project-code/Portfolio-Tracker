<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Debug Console</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v=static_version) }}">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Debug Console</h1>
        <p>Inspect report execution logs and error details.</p>
      </div>
      <div class="header-actions">
        <a class="button-link" href="{{ url_for('index') }}">Portfolio Tracker</a>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panel-heading">
          <h2>Console Output</h2>
          <button id="refresh-console" type="button">Refresh</button>
        </div>
        <section class="status-row debug-status-row" aria-live="polite">
          <div>
            <span class="label">Refresh status</span>
            <strong id="debug-refresh-status">Ready</strong>
          </div>
          <div>
            <span class="label">Last refreshed</span>
            <strong id="debug-last-refreshed">Never</strong>
          </div>
          <div>
            <span class="label">Result</span>
            <strong id="debug-refresh-result">No checks yet</strong>
          </div>
        </section>
        <section id="debug-refresh-notice" class="notice-row info" hidden></section>
        <section id="debug-refresh-history-panel" class="panel warnings-panel" hidden>
          <div class="panel-heading">
            <h3>Refresh History</h3>
            <span class="caption">Latest 3 attempts</span>
          </div>
          <ul id="debug-refresh-history" class="warning-list"></ul>
        </section>
        <pre id="console-output">Run the report to display parser output here.</pre>
      </section>
    </main>
    <button id="back-to-top" class="back-to-top" type="button" hidden>Back To Top</button>

    <script src="{{ url_for('static', filename='debug.js', v=static_version) }}"></script>
    <script src="{{ url_for('static', filename='back_to_top.js', v=static_version) }}"></script>
  </body>
</html>
